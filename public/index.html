<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gsongrok Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }

        .status-badge { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; }

        .tabs { display: flex; gap: 8px; margin-bottom: 24px; background: rgba(255, 255, 255, 0.03); padding: 4px; border-radius: 12px; width: fit-content; border: 1px solid var(--glass-border); }

        .tab { padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; color: var(--text-dim); }

        .tab.active { background: var(--accent-primary); color: white; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3); }

        .card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; padding: 24px; margin-bottom: 24px; }

        .raw-editor { width: 100%; height: 450px; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--accent-primary); font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 16px; resize: vertical; outline: none; }

        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }

        .btn-primary { background: var(--accent-primary); color: white; }

        .traffic-grid { display: grid; grid-template-columns: 400px 1fr; gap: 24px; height: 700px; }

        .traffic-sidebar { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 10px; }

        .traffic-item { display: grid; grid-template-columns: 70px 50px 1fr 40px; align-items: center; padding: 12px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; border: 1px solid transparent; cursor: pointer; }

        .traffic-item:hover { background: rgba(255, 255, 255, 0.06); }

        .traffic-item.active { border-color: var(--accent-primary); background: rgba(56, 189, 248, 0.1); }

        .method { font-weight: 800; font-size: 0.65rem; padding: 2px 4px; border-radius: 4px; text-align: center; }

        .method-GET { color: #61afef; background: rgba(97, 175, 239, 0.1); }

        .method-POST { color: #98c379; background: rgba(152, 195, 121, 0.1); }

        .status-2xx { color: var(--success); }

        .status-4xx { color: var(--warning); }

        .status-5xx { color: var(--danger); }

        .detail-view { background: rgba(15, 23, 42, 0.5); border-radius: 12px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; }

        .detail-header { padding: 16px; border-bottom: 1px solid var(--glass-border); background: rgba(255, 255, 255, 0.02); }

        .detail-content { flex: 1; overflow-y: auto; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }

        .code-block { background: rgba(0, 0, 0, 0.3); padding: 12px; border-radius: 8px; margin-top: 10px; white-space: pre-wrap; word-break: break-all; color: var(--text-dim); }

        .detail-label { color: var(--accent-primary); font-weight: 600; margin-top: 20px; margin-bottom: 8px; display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .toast { position: fixed; bottom: 24px; right: 24px; color: white; padding: 12px 24px; border-radius: 8px; transform: translateY(100px); transition: transform 0.3s; z-index: 1000; font-weight: 600; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.show { transform: translateY(0); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { h, render } from 'https://esm.sh/preact';
        import { useState, useEffect } from 'https://esm.sh/preact/hooks';
        import htm from 'https://esm.sh/htm';

        const html = htm.bind(h);

        function JsonView({ data, depth = 0 }) {
            const [collapsed, setCollapsed] = useState(depth > 1);
            if (data === null) return html`<span style="color: #abb2bf">null</span>`;
            if (typeof data === 'string') return html`<span style="color: #98c379">"${data}"</span>`;
            if (typeof data === 'number') return html`<span style="color: #d19a66">${data}</span>`;
            if (typeof data === 'boolean') return html`<span style="color: #c678dd">${data.toString()}</span>`;

            const isArray = Array.isArray(data);
            const keys = Object.keys(data);

            if (keys.length === 0) return html`<span style="color: #abb2bf">${isArray ? '[]' : '{}'}</span>`;

            return html`
                <div style="padding-left: ${depth > 0 ? '12px' : '0'}">
                    <span onClick=${() => setCollapsed(!collapsed)} style="cursor: pointer; user-select: none; color: var(--accent-primary); font-weight: bold;">
                        ${collapsed ? (isArray ? '▶ [...]' : '▶ {...}') : (isArray ? '▼ [' : '▼ {')}
                    </span>
                    ${!collapsed && html`
                        <div style="border-left: 1px solid rgba(255,255,255,0.1); margin-left: 6px; padding-left: 4px;">
                            ${keys.map(k => html`
                                <div style="padding: 2px 0;">
                                    <span style="color: var(--accent-secondary)">${isArray ? '' : `"${k}": `}</span>
                                    <${JsonView} data=${data[k]} depth=${depth + 1} />
                                </div>
                            `)}
                        </div>
                    `}
                    ${!collapsed && html`<span style="color: var(--accent-primary); font-weight: bold;">${isArray ? ']' : '}'}</span>`}
                </div>
            `;
        }

        function App() {
            const [activeTab, setActiveTab] = useState('config');
            const [paths, setPaths] = useState({});
            const [info, setInfo] = useState({ status: 'offline' });
            const [traffic, setTraffic] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            const [rawText, setRawText] = useState('');
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

            useEffect(() => {
                fetchPaths();
                const infoInt = setInterval(fetchInfo, 3000);
                const trafficInt = setInterval(fetchTraffic, 2000);
                return () => { clearInterval(infoInt); clearInterval(trafficInt); };
            }, []);

            const showNotify = (message, type = 'success') => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, show: false })), 3000);
            };

            const fetchInfo = async () => {
                try {
                    const res = await fetch('/gsongrok/info');
                    const data = await res.json();
                    setInfo(data);
                } catch (e) {}
            };

            const fetchTraffic = async () => {
                try {
                    const res = await fetch('/gsongrok/traffic');
                    const data = await res.json();
                    setTraffic(data);
                } catch (e) {}
            };

            const fetchPaths = async () => {
                const res = await fetch('/gsongrok.json');
                const data = await res.json();
                setPaths(data);
                setRawText(JSON.stringify(data, null, 2));
                setLoading(false);
            };

            const saveChanges = async () => {
                try {
                    const parsed = JSON.parse(rawText);
                    const res = await fetch('/gsongrok.json', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(parsed) 
                    });
                    if (res.ok) {
                        setPaths(parsed);
                        showNotify("Configuration saved successfully!");
                    } else {
                        showNotify("Server rejected the update", "error");
                    }
                } catch (e) { 
                    showNotify("JSON Error: " + e.message, "error"); 
                }
            };

            const selectedEvent = traffic.find(t => t.id === selectedId);

            if (loading) return html`<div style="display: flex; height: 100vh; align-items: center; justify-content: center; color: var(--text-dim)">Loading gsongrok...</div>`;

            return html`
                <div class="container">
                    <header>
                        <div class="logo">gsongrok</div>
                        <div class="status-badge">
                            <div class="status-dot" style="background: ${info.status === 'online' ? 'var(--success)' : 'var(--danger)'}"></div>
                            ${info.status.toUpperCase()} ${info.ngrok_url ? `| ${info.ngrok_url}` : ''}
                        </div>
                    </header>

                    <div class="tabs">
                        <div class="tab ${activeTab === 'config' ? 'active' : ''}" onClick=${() => setActiveTab('config')}>Configuration</div>
                        <div class="tab ${activeTab === 'traffic' ? 'active' : ''}" onClick=${() => setActiveTab('traffic')}>Inspector</div>
                    </div>

                    ${activeTab === 'config' ? html`
                        <div>
                            <div class="card">
                                <h3 style="margin-bottom: 16px;">JSON Mock Editor</h3>
                                <textarea class="raw-editor" value=${rawText} onInput=${e => setRawText(e.target.value)} spellcheck="false"></textarea>
                                <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
                                    <button class="btn btn-primary" onClick=${saveChanges}>Save & Apply</button>
                                </div>
                            </div>
                        </div>
                    ` : html`
                        <div class="card" style="padding: 16px;">
                            <div class="traffic-grid">
                                <div class="traffic-sidebar">
                                    ${traffic.length === 0 ? html`<p style="color: var(--text-dim); text-align: center; padding: 40px;">No traffic yet.</p>` : 
                                      traffic.map(t => html`
                                        <div class="traffic-item ${selectedId === t.id ? 'active' : ''}" onClick=${() => setSelectedId(t.id)}>
                                            <span style="color: var(--text-dim)">${t.timestamp}</span>
                                            <span class="method method-${t.method}">${t.method}</span>
                                            <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${t.path}</span>
                                            <span class="status-code status-${Math.floor(t.status/100)}xx">${t.status}</span>
                                        </div>
                                    `)}
                                </div>
                                <div class="detail-view">
                                    ${!selectedEvent ? html`<div style="display: flex; height: 100%; align-items: center; justify-content: center; color: var(--text-dim)">Select a request to view details</div>` : html`
                                        <div class="detail-header">
                                            <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 8px;">
                                                <span class="method method-${selectedEvent.method}">${selectedEvent.method}</span>
                                                <h3 style="font-size: 1.1rem;">${selectedEvent.path}</h3>
                                            </div>
                                            <span style="font-size: 0.8rem; color: var(--text-dim)">${selectedEvent.host}</span>
                                        </div>
                                        <div class="detail-content">
                                            <span class="detail-label" style="margin-top: 0;">Plain Request (Dump)</span>
                                            <div class="code-block" style="color: var(--accent-primary)">${selectedEvent.raw_request}</div>

                                            <span class="detail-label">Headers</span>
                                            <div class="code-block">
                                                ${Object.entries(selectedEvent.headers).map(([k, v]) => html`<div><span style="color: var(--accent-secondary)">${k}:</span> ${v.join(', ')}</div>`)}
                                            </div>

                                            <span class="detail-label">Captured Body</span>
                                            <div class="code-block">
                                                ${(() => {
                                                    try {
                                                        const parsed = JSON.parse(selectedEvent.body);
                                                        return html`<${JsonView} data=${parsed} />`;
                                                    } catch (e) {
                                                        return selectedEvent.body || '(Empty)';
                                                    }
                                                })()}
                                            </div>
                                        </div>
                                    `}
                                </div>
                            </div>
                        </div>
                    `}

                    <div class="toast ${toast.type} ${toast.show ? 'show' : ''}">${toast.message}</div>
                </div>
            `;
        }

        render(html`<${App} />`, document.getElementById('app'));
    </script>
</body>
</html>
